name: Run test script

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  unit_tests:
    runs-on: ubuntu-24.04

    container:
      image: rakudo-star:2024.12

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run unit tests
        run: sh ./bin/ci-unit-tests.sh

